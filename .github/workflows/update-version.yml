name: Update Latest Release Version

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch latest release tag
        id: release
        run: |
          TAG=$(curl -s https://api.github.com/repos/MACE-App/MACE/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update version in config
        run: |
          sed -i "s|Latest release: <a href=\"https://github.com/MACE-App/MACE/releases\">.*</a>|Latest release: <a href=\"https://github.com/MACE-App/MACE/releases\">${{ steps.release.outputs.tag }}</a>|" docusaurus.config.js

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docusaurus.config.js
          git commit -m "Update latest release version to ${{ steps.release.outputs.tag }}"
          git push

      - name: Trigger deploy
        if: steps.diff.outputs.changed == 'true'
        run: |
          gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
